<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede8df"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b7cb0" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#9b7cb0" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#9b7cb0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9b7cb0" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#18110e" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- atomiser bulb -->
  <ellipse cx="238" cy="160" rx="18" ry="14" fill="#d4b8a0" filter="url(#shadow)"/>
  <!-- atomiser tube -->
  <rect x="215" y="153" width="28" height="8" rx="4" fill="#d4b8a0"/>
  <!-- sprayer nozzle -->
  <rect x="199" y="136" width="18" height="28" rx="5" fill="#9b7cb0" opacity="0.7"/>
  <rect x="203" y="130" width="10" height="10" rx="3" fill="#9b7cb0" opacity="0.5"/>
  <!-- bottle neck -->
  <rect x="186" y="162" width="28" height="30" rx="6" fill="#d8d0c5"/>
  <!-- glass bottle body -->
  <rect x="148" y="188" width="104" height="180" rx="6" fill="url(#glass)" filter="url(#shadow)"/>
  <!-- glass shine -->
  <rect x="156" y="196" width="18" height="164" rx="4" fill="white" opacity="0.3"/>
  <!-- glass depth -->
  <rect x="148" y="188" width="104" height="180" rx="6" fill="none" stroke="#9b7cb0" stroke-width="1" stroke-opacity="0.3"/>
  <!-- inner colour fill -->
  <rect x="152" y="192" width="96" height="172" rx="4" fill="#9b7cb0" opacity="0.18"/>
  <!-- label -->
  <rect x="164" y="248" width="72" height="62" fill="white" opacity="0.5" rx="2"/>
  <rect x="164" y="248" width="72" height="62" fill="none" stroke="#9b7cb0" stroke-width="0.5" rx="2" opacity="0.5"/>
  <!-- bottle base -->
  <rect x="148" y="366" width="104" height="10" rx="3" fill="#9b7cb0" opacity="0.3"/>
  <ellipse cx="200" cy="376" rx="52" ry="9" fill="#18110e" opacity="0.1"/>
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">SOLAR BLOOM EDT</text>
</svg>