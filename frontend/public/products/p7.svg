<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ddd6cc"/>
      <stop offset="40%" stop-color="#f0ebe3"/>
      <stop offset="100%" stop-color="#c8c0b4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#18110e" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- cap -->
  <rect x="183" y="100" width="34" height="50" rx="8" fill="#8b2e4e" opacity="0.85" filter="url(#shadow)"/>
  <rect x="189" y="106" width="22" height="38" rx="5" fill="#8b2e4e" opacity="0.4"/>
  <!-- neck -->
  <rect x="188" y="148" width="24" height="20" rx="4" fill="#ddd5cb"/>
  <!-- body -->
  <rect x="165" y="165" width="70" height="210" rx="10" fill="url(#tube)" filter="url(#shadow)"/>
  <rect x="173" y="173" width="16" height="194" rx="5" fill="white" opacity="0.22"/>
  <!-- label band -->
  <rect x="165" y="235" width="70" height="70" fill="#8b2e4e" opacity="0.1"/>
  <line x1="165" y1="235" x2="235" y2="235" stroke="#8b2e4e" stroke-width="1" opacity="0.3"/>
  <line x1="165" y1="305" x2="235" y2="305" stroke="#8b2e4e" stroke-width="1" opacity="0.3"/>
  <!-- crimped bottom -->
  <rect x="165" y="372" width="70" height="8" rx="4" fill="#c4bdb0"/>
  <ellipse cx="200" cy="382" rx="35" ry="7" fill="#18110e" opacity="0.07"/>
  <!-- brand -->
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">SILK REPAIR</text>
</svg>