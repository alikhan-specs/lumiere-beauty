<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0d9d1"/>
      <stop offset="40%" stop-color="#f3ede6"/>
      <stop offset="100%" stop-color="#cdc6bc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18110e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- pump top -->
  <rect x="196" y="80" width="8" height="30" rx="4" fill="#d4b8a0"/>
  <ellipse cx="200" cy="80" rx="10" ry="6" fill="#a67c52" opacity="0.7"/>
  <!-- pump collar -->
  <rect x="182" y="108" width="36" height="18" rx="6" fill="#d8d0c5" filter="url(#shadow)"/>
  <!-- neck -->
  <rect x="186" y="124" width="28" height="24" rx="4" fill="#cfc8be"/>
  <!-- body -->
  <rect x="155" y="146" width="90" height="220" rx="16" fill="url(#bottle)" filter="url(#shadow)"/>
  <rect x="164" y="154" width="22" height="204" rx="6" fill="white" opacity="0.22"/>
  <!-- label -->
  <rect x="165" y="220" width="70" height="80" fill="#a67c52" opacity="0.09"/>
  <line x1="165" y1="220" x2="235" y2="220" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <line x1="165" y1="300" x2="235" y2="300" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <!-- shadow -->
  <ellipse cx="200" cy="370" rx="45" ry="9" fill="#18110e" opacity="0.08"/>
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">VELVET FOUNDATION</text>
</svg>