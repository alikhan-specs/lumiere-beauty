<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede8df"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8c0b2"/>
      <stop offset="40%" stop-color="#ddd5c8"/>
      <stop offset="100%" stop-color="#b8b0a4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18110e" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- cap -->
  <rect x="182" y="100" width="36" height="40" rx="8" fill="#a67c52" opacity="0.82" filter="url(#shadow)"/>
  <!-- shoulder -->
  <path d="M170,138 Q200,130 230,138 L230,168 L170,168 Z" fill="#cfc8be"/>
  <!-- body - slim elegant bottle -->
  <rect x="163" y="165" width="74" height="210" rx="8" fill="url(#bottle)" filter="url(#shadow)"/>
  <rect x="172" y="173" width="16" height="194" rx="5" fill="white" opacity="0.18"/>
  <!-- oil droplet detail -->
  <ellipse cx="210" cy="270" rx="12" ry="16" fill="#a67c52" opacity="0.15"/>
  <ellipse cx="210" cy="264" rx="5" ry="6" fill="#a67c52" opacity="0.2"/>
  <!-- label -->
  <rect x="163" y="240" width="74" height="72" fill="#a67c52" opacity="0.08"/>
  <line x1="163" y1="240" x2="237" y2="240" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <line x1="163" y1="312" x2="237" y2="312" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <ellipse cx="200" cy="378" rx="37" ry="8" fill="#18110e" opacity="0.08"/>
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">HYDRA-GLOW OIL</text>
</svg>