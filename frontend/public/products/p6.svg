<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="wand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0d8ce"/>
      <stop offset="50%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#cec6ba"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#18110e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- applicator wand diagonal -->
  <g transform="rotate(-20, 200, 250)">
    <!-- cap -->
    <rect x="176" y="88" width="48" height="70" rx="10" fill="#d4899a" opacity="0.88" filter="url(#shadow)"/>
    <rect x="182" y="94" width="36" height="58" rx="7" fill="#d4899a" opacity="0.35"/>
    <!-- tube body -->
    <rect x="180" y="156" width="40" height="220" rx="8" fill="url(#wand)" filter="url(#shadow)"/>
    <rect x="187" y="163" width="12" height="206" rx="4" fill="white" opacity="0.25"/>
    <!-- gloss band -->
    <rect x="180" y="240" width="40" height="2" fill="#d4899a" opacity="0.25"/>
    <rect x="180" y="296" width="40" height="2" fill="#d4899a" opacity="0.25"/>
    <!-- applicator tip -->
    <ellipse cx="200" cy="375" rx="10" ry="16" fill="#d4899a" opacity="0.7"/>
    <ellipse cx="200" cy="378" rx="7" ry="10" fill="#d4899a" opacity="0.4"/>
  </g>
  <ellipse cx="200" cy="430" rx="30" ry="6" fill="#18110e" opacity="0.07"/>
  <text x="200" y="465" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="480" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">PILLOW LIPS</text>
</svg>