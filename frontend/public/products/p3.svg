<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede8df"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="jar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0d8ce"/>
      <stop offset="35%" stop-color="#f2ede6"/>
      <stop offset="100%" stop-color="#cdc5b9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#18110e" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- lid -->
  <ellipse cx="200" cy="228" rx="82" ry="14" fill="#e8e2d9" filter="url(#shadow)"/>
  <rect x="118" y="215" width="164" height="36" rx="0" fill="#8b2e4e" opacity="0.08"/>
  <rect x="118" y="228" width="164" height="22" rx="0" fill="#e8e2d9"/>
  <ellipse cx="200" cy="250" rx="82" ry="14" fill="#ddd6cc"/>
  <!-- jar body -->
  <rect x="124" y="250" width="152" height="120" rx="4" fill="url(#jar)" filter="url(#shadow)"/>
  <rect x="132" y="258" width="28" height="104" rx="4" fill="white" opacity="0.2"/>
  <!-- label -->
  <rect x="148" y="275" width="104" height="58" rx="3" fill="#8b2e4e" opacity="0.1"/>
  <rect x="148" y="275" width="104" height="1" fill="#8b2e4e" opacity="0.35"/>
  <rect x="148" y="333" width="104" height="1" fill="#8b2e4e" opacity="0.35"/>
  <!-- bottom shadow -->
  <ellipse cx="200" cy="375" rx="76" ry="10" fill="#18110e" opacity="0.08"/>
  <!-- brand -->
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">MIDNIGHT MASK</text>
</svg>