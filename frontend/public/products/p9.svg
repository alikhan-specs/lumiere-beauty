<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e0d5"/>
      <stop offset="40%" stop-color="#f5f0ea"/>
      <stop offset="100%" stop-color="#cfc6b8"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a67c52" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a67c52" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18110e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- subtle grain -->
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply" result="blend"/></filter>
  <rect width="400" height="500" fill="#f6f2ec" opacity="0.03" filter="url(#grain)"/>
  <!-- dropper tip -->
  <rect x="194" y="90" width="12" height="60" rx="6" fill="#d4b8a0" filter="url(#shadow)"/>
  <ellipse cx="200" cy="90" rx="6" ry="4" fill="#d4b8a0"/>
  <!-- cap -->
  <rect x="168" y="148" width="64" height="70" rx="12" fill="url(#cap)" filter="url(#shadow)"/>
  <rect x="174" y="154" width="52" height="58" rx="9" fill="#a67c52" opacity="0.3"/>
  <!-- bottle body -->
  <rect x="158" y="210" width="84" height="190" rx="14" fill="url(#bottle)" filter="url(#shadow)"/>
  <rect x="166" y="218" width="20" height="170" rx="6" fill="white" opacity="0.25"/>
  <!-- label band -->
  <rect x="158" y="295" width="84" height="52" fill="#a67c52" opacity="0.12"/>
  <rect x="158" y="295" width="84" height="1" fill="#a67c52" opacity="0.3"/>
  <rect x="158" y="347" width="84" height="1" fill="#a67c52" opacity="0.3"/>
  <!-- bottom -->
  <ellipse cx="200" cy="400" rx="42" ry="8" fill="#18110e" opacity="0.07"/>
  <!-- brand text -->
  <text x="200" y="450" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="467" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">SCALP SERUM</text>
</svg>