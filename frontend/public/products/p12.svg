<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <linearGradient id="can" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d1c8"/>
      <stop offset="35%" stop-color="#ede8e0"/>
      <stop offset="100%" stop-color="#c8c0b4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18110e" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- spray nozzle -->
  <rect x="186" y="92" width="28" height="16" rx="6" fill="#a67c52" opacity="0.75"/>
  <rect x="207" y="84" width="16" height="24" rx="5" fill="#a67c52" opacity="0.6"/>
  <!-- mist particles -->
  <circle cx="230" cy="80" r="2.5" fill="#a67c52" opacity="0.2"/>
  <circle cx="240" cy="72" r="1.5" fill="#a67c52" opacity="0.15"/>
  <circle cx="236" cy="62" r="1" fill="#a67c52" opacity="0.1"/>
  <circle cx="248" cy="68" r="2" fill="#a67c52" opacity="0.12"/>
  <!-- can body -->
  <rect x="155" y="106" width="90" height="254" rx="14" fill="url(#can)" filter="url(#shadow)"/>
  <rect x="164" y="114" width="20" height="238" rx="6" fill="white" opacity="0.22"/>
  <!-- label band -->
  <rect x="155" y="195" width="90" height="90" fill="#a67c52" opacity="0.1"/>
  <line x1="155" y1="195" x2="245" y2="195" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <line x1="155" y1="285" x2="245" y2="285" stroke="#a67c52" stroke-width="1" opacity="0.3"/>
  <!-- can cap top curve -->
  <ellipse cx="200" cy="108" rx="45" ry="8" fill="#d0c9bf"/>
  <!-- can bottom -->
  <ellipse cx="200" cy="358" rx="45" ry="8" fill="#c8c0b4"/>
  <ellipse cx="200" cy="368" rx="45" ry="8" fill="#18110e" opacity="0.08"/>
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">AMBER MIST</text>
</svg>