<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="100%" stop-color="#ede8df"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#18110e" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- palette outer -->
  <rect x="100" y="155" width="200" height="150" rx="10" fill="#2a1f1a" filter="url(#shadow)"/>
  <rect x="106" y="161" width="188" height="138" rx="7" fill="#1e1510"/>
  <!-- mirror -->
  <rect x="110" y="165" width="180" height="80" rx="5" fill="#e8e0d5" opacity="0.15"/>
  <rect x="116" y="170" width="168" height="68" rx="3" fill="#ddd5c8" opacity="0.2"/>
  <!-- swatches row 1 -->
  <circle cx="140" cy="265" r="14" fill="#8b2e4e" opacity="0.9"/>
  <circle cx="172" cy="265" r="14" fill="#c9956b"/>
  <circle cx="204" cy="265" r="14" fill="#d4899a"/>
  <circle cx="236" cy="265" r="14" fill="#d4b8a0"/>
  <circle cx="268" cy="265" r="14" fill="#e8ddd0"/>
  <!-- swatches highlight -->
  <circle cx="140" cy="265" r="14" fill="white" opacity="0.08"/>
  <circle cx="204" cy="265" r="14" fill="white" opacity="0.08"/>
  <!-- compact hinge -->
  <rect x="192" y="300" width="16" height="8" rx="3" fill="#3a2f28"/>
  <!-- compact bottom -->
  <rect x="100" y="304" width="200" height="52" rx="10" fill="#2a1f1a"/>
  <rect x="106" y="308" width="188" height="42" rx="7" fill="#221814"/>
  <!-- gold clasp -->
  <rect x="188" y="328" width="24" height="8" rx="4" fill="#a67c52" opacity="0.8"/>
  <!-- shadow -->
  <ellipse cx="200" cy="360" rx="100" ry="11" fill="#18110e" opacity="0.1"/>
  <text x="200" y="430" font-family="Georgia, serif" font-size="11" fill="#a67c52" text-anchor="middle" letter-spacing="4" opacity="0.9">LUMIÈRE</text>
  <text x="200" y="447" font-family="Georgia, serif" font-size="8" fill="#18110e" text-anchor="middle" letter-spacing="2" opacity="0.5">SCULPT PALETTE</text>
</svg>